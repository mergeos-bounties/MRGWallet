name: ci

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Test
        run: npm test
      - name: Demo
        run: npm run demo
      - name: Build web + extensions + android assets
        run: npm run build
      - name: Package release zips
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zip
          npm run package:release
