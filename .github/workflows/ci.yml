name: ci

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Test
        run: npm test
      - name: Demo
        run: npm run demo
      - name: Validate extension manifests
        run: |
          for f in packages/extension/manifest.chrome.json packages/extension/manifest.firefox.json; do
            echo "Validating $f"
            name=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$f','utf8')).name)")
            ver=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$f','utf8')).version)")
            echo "  name=$name version=$ver"
            test "$name" = "MRGWallet" || { echo "FAIL: name mismatch in $f"; exit 1; }
            test "$(node -e "console.log(JSON.parse(require('fs').readFileSync('$f','utf8')).manifest_version)")" = "3" || { echo "FAIL: must be MV3 in $f"; exit 1; }
            perms=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$f','utf8')).permissions.join(','))")
            echo "  permissions=$perms"
            test "$(echo "$perms" | grep -o storage)" = "storage" || { echo "FAIL: storage permission missing in $f"; exit 1; }
            echo "  OK"
          done
      - name: Build web + extensions + android assets
        run: npm run build
      - name: Package release zips
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zip
          npm run package:release
